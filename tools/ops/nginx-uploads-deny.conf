# Include this before the generic PHP location for 599549.com.
# It blocks PHP execution from writable upload directories while allowing static files.
location ~* ^/(public/uploads|storage/uploads)/.*\.(php|php[0-9]?|phtml|phar)$ {
    return 403;
}

location ~* ^/(tools|storage|database|config|bootstrap|app)/ {
    return 404;
}
